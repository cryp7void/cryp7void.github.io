5theme: jekyll-theme-chirpy
lang: en
8# ✅ FIX: Was empty — set to Nairobi (EAT, UTC+3)
timezone: Africa/Nairobi
# ── Identity ─────────────────────────────────────────
title: cryp7void
tagline: CTFs · Pentesting · Malware Analysis · OSINT
description: >-
Cybersecurity research blog. CTF writeups, penetration testing
notes, malware analysis, OSINT techniques, and tool breakdowns.
url: "https://cryp7void.github.io"
# ── Socials ───────────────────────────────────────────
github:
username: cryp7void
twitter:
username: your_handle_here  # ✅ FIX: was placeholder
social:
# ✅ FIX: indentation was broken (YAML parse error)
name: Faith Mutai
email: faithjepmutai5@gmail.com
fediverse_handle:  # ✅ FIX: removed junk keystrokes in comment
links:
# ✅ FIX: was still pointing to twitter/github /username
- https://github.com/cryp7void
- https://twitter.com/your_handle_here
# ↓ ADDED: cybersecurity platform links
- https://app.hackthebox.com/profile/your_id
- https://tryhackme.com/p/your_username
# - https://www.linkedin.com/in/username
# ── Appearance ───────────────────────────────────────
theme_mode: dark  # ADDED: dark mode default — fits the aesthetic
avatar: /assets/img/avatar.png
social_preview_image: /assets/img/og-preview.png  # 1200x630px
cdn:
toc: true
# ── Comments (giscus = GitHub-based, no ads) ─────────
comments:
provider: giscus  # ADDED: recommended for tech blogs
giscus:
repo: cryp7void/cryp7void.github.io
repo_id:      # get from giscus.app
category:     # e.g. Announcements
category_id:
mapping: pathname
strict: 0
input_position: bottom
reactions_enabled: 1
# ── Analytics ────────────────────────────────────────
analytics:
google:
id:   # G-XXXXXXXXXX
goatcounter:
id:   # privacy-first alt — good for infosec audience
pageviews:
provider:  # set to goatcounter if you use it
# ── SEO verification ─────────────────────────────────
webmaster_verifications:
google:
bing:
# ── PWA ──────────────────────────────────────────────
pwa:
enabled: true
cache:
enabled: true
paginate: 10
baseurl: ""
# ── Jekyll Archives (auto tag/cat pages) ─────────────
jekyll-archives:
enabled: [categories, tags]
layouts:
category: category
tag: tag
permalinks:
tag: /tags/:name/
category: /categories/:name/
# ── Do not modify below ───────────────────────────────
kramdown:
footnote_backlink: "↩︎"
syntax_highlighter: rouge
syntax_highlighter_opts:
css_class: highlight
block:
line_numbers: true
start_line: 1
